name: Apply Supabase Migrations

on:
  push:
    branches: [master]
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Sync migration history
        run: |
          # Revoke remote versions that don't match local files
          remote_versions=$(supabase migration list 2>/dev/null | grep -oE '[0-9]{14}' || true)
          local_versions=$(ls supabase/migrations/*.sql 2>/dev/null | xargs -I{} basename {} .sql | grep -oE '^[0-9]{14}' || true)
          for rv in $remote_versions; do
            if ! echo "$local_versions" | grep -q "^${rv}$"; then
              echo "Revoking unknown remote migration: $rv"
              supabase migration repair --status reverted "$rv" || true
            fi
          done

          # Find new migrations (added in this push)
          new_files=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'supabase/migrations/*.sql' || true)
          new_versions=""
          for f in $new_files; do
            v=$(basename "$f" .sql | grep -oE '^[0-9]{14}')
            new_versions="$new_versions $v"
          done

          # Mark all existing local migrations as applied (except new ones)
          for lv in $local_versions; do
            if ! echo "$new_versions" | grep -q "$lv"; then
              echo "Marking migration as applied: $lv"
              supabase migration repair --status applied "$lv" 2>/dev/null || true
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
