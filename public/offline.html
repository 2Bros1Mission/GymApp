<!DOCTYPE html>
<html lang="bg">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4F46E5" />
    <title>GymApp — Офлайн</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0F0F1A;
        color: #FFFFFF;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .icon {
        font-size: 64px;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 22px;
        margin-bottom: 12px;
      }
      p {
        font-size: 16px;
        color: #9CA3AF;
        margin-bottom: 32px;
        line-height: 1.5;
      }
      button {
        background: #4F46E5;
        color: #FFFFFF;
        border: none;
        padding: 14px 32px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
      button:active { background: #3730A3; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>Няма връзка с интернет</h1>
      <p>Провери връзката си и опитай отново. Приложението ще се зареди веднага щом има мрежа.</p>
      <button onclick="window.location.reload()">Опитай отново</button>
    </div>
  </body>
</html>
